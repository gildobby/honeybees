<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가상 피팅 중</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone {
      width: 100%;
      max-width: 390px;
      height: 100vh;
      position: relative;
      overflow: hidden;
      border-radius: 12px;
    }

    /* ── 배경 사진 ── */
    .bg-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
    }

    /* ── 어두운 오버레이 ── */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(30, 30, 30, 0.62);
    }

    /* ── 중앙 콘텐츠 ── */
    .center-content {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 0 40px;
      text-align: center;
    }

    /* ── 스파클 아이콘 ── */
    .sparkle-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: sparkle-pulse 2s ease-in-out infinite;
    }

    @keyframes sparkle-pulse {
      0%, 100% { transform: scale(1);   opacity: 1; }
      50%       { transform: scale(1.1); opacity: 0.8; }
    }

    .loading-text {
      color: #ffffff;
      font-size: var(--text-md);
      font-weight: 500;
      line-height: 1.7;
      letter-spacing: -0.3px;
    }

    /* ── 하단 점 인디케이터 ── */
    .dot-wrap {
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
      animation: dot-blink 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-blink {
      0%, 80%, 100% { background: rgba(255,255,255,0.35); transform: scale(1); }
      40%           { background: rgba(255,255,255,0.9);  transform: scale(1.3); }
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- 배경 모델 사진 -->
  <img class="bg-photo" src="image/1.png" alt="" />

  <!-- 어두운 오버레이 -->
  <div class="overlay"></div>

  <!-- 중앙 콘텐츠 -->
  <div class="center-content">
    <!-- 핑크 스파클 SVG -->
    <div class="sparkle-wrap">
      <svg width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 4C26 4 27.5 16 34 22C40.5 28 52 26 52 26C52 26 40.5 24 34 30C27.5 36 26 48 26 48C26 48 24.5 36 18 30C11.5 24 0 26 0 26C0 26 11.5 28 18 22C24.5 16 26 4 26 4Z" fill="#FF4589"/>
        <path d="M40 2C40 2 40.8 7.5 43.5 10.2C46.2 12.9 52 13 52 13C52 13 46.2 13.1 43.5 15.8C40.8 18.5 40 24 40 24C40 24 39.2 18.5 36.5 15.8C33.8 13.1 28 13 28 13C28 13 33.8 12.9 36.5 10.2C39.2 7.5 40 2 40 2Z" fill="#ff8ab8" opacity="0.85"/>
        <path d="M10 0C10 0 10.5 3.8 12.2 5.5C13.9 7.2 18 7.5 18 7.5C18 7.5 13.9 7.8 12.2 9.5C10.5 11.2 10 15 10 15C10 15 9.5 11.2 7.8 9.5C6.1 7.8 2 7.5 2 7.5C2 7.5 6.1 7.2 7.8 5.5C9.5 3.8 10 0 10 0Z" fill="#ff8ab8" opacity="0.7"/>
      </svg>
    </div>

    <p class="loading-text">유길정님 체형에 맞춰<br>가상 피팅을 진행 중이에요.<br>잠시만 기다려주세요!</p>
  </div>

  <!-- 하단 점 인디케이터 -->
  <div class="dot-wrap">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</div>

<script>
  // 2.5초 후 피팅룸으로 이동
  setTimeout(() => {
    window.location.href = 'fitting_room.html';
  }, 2500);
</script>
</body>
</html>
