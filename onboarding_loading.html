<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>체형 분석 결과</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone {
      background: var(--bg-card);
      width: 100%;
      max-width: 390px;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ── Loading Screen ── */
    #screenLoading {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 48px 40px;
      background: var(--bg-card);
      transition: opacity 0.5s ease, transform 0.5s ease;
      z-index: 10;
    }

    #screenLoading.exit {
      opacity: 0;
      transform: scale(0.96);
      pointer-events: none;
    }

    .ring-wrap {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .pct-label {
      position: relative;
      z-index: 1;
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
    }

    .ring-track { fill: none; stroke: var(--border-light); stroke-width: 9; }
    .ring-fill  { fill: none; stroke: url(#ringGrad); stroke-width: 9; stroke-linecap: round; }

    .loading-title {
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.4;
      margin-top: 24px;
    }

    .loading-sub {
      font-size: var(--text-base);
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.6;
      margin-top: -14px;
    }

    /* ── Result Screen ── */
    #screenResult {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.6s cubic-bezier(0.2,0,0,1), transform 0.6s cubic-bezier(0.2,0,0,1);
      background: #ffffff;
    }

    #screenResult.show {
      opacity: 1;
      transform: translateY(0);
    }

    .result-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .result-scroll::-webkit-scrollbar { display: none; }

    /* Header */
    .result-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 20px;
      background: var(--bg-card);
      transition: box-shadow 0.2s;
    }

    .result-header.scrolled {
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .result-header svg.logo {
      height: 20px;
      width: auto;
    }

    .avatar-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: var(--bg-input);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      cursor: pointer;
    }

    /* Type title block */
    .type-title-block {
      text-align: center;
      padding: 16px 24px 0;
    }

    .type-name {
      font-size: 32px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .type-subtitle {
      font-size: var(--text-base);
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* Illustration — no card, centered */
    .illust-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 40px 0px;
    }

    .illust-wrap svg {
      width: auto;
      max-width: 110px;
      height: auto;
      display: block;
      filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.10));
    }

    /* Gauge section */
    .gauge-sec {
      padding: 28px 28px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gauge-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .gauge-label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      width: 54px;
      flex-shrink: 0;
    }

    .gauge-track {
      flex: 1;
      height: 14px;
      border-radius: var(--radius-pill);
      background: #F0F0F0;
      position: relative;
      overflow: hidden;
    }

    .gauge-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--brand);
      border-radius: 0;
    }

    /* 구분선 오버레이: 20% 간격으로 4개 세로선 */
    .gauge-track::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc(20% - 0.75px),
        rgba(255, 255, 255, 0.55) calc(20% - 0.75px),
        rgba(255, 255, 255, 0.55) calc(20% + 0.75px),
        transparent calc(20% + 0.75px),
        transparent 20%
      );
      pointer-events: none;
    }

    /* Features bullet list */
    .features-sec {
      padding: 4px 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .features-item {
      font-size: var(--text-sm);
      color: var(--text-primary);
      line-height: 1.6;
      display: flex;
      gap: 6px;
    }

    .features-item::before {
      content: '·';
      font-size: 18px;
      color: var(--text-secondary);
      flex-shrink: 0;
      line-height: 1.4;
    }

    /* CTA */
    .cta-area {
      flex-shrink: 0;
      padding: 12px 20px 32px;
      background: var(--bg-card);
    }

    .cta-hint {
      text-align: center;
      font-size: var(--text-sm);
      color: var(--text-tertiary);
      margin-bottom: 12px;
    }

    .cta-btn {
      width: 100%;
      height: 47px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--brand);
      color: var(--text-inverse);
      border: none;
      border-radius: var(--radius);
      font-size: var(--text-base);
      font-weight: 700;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .cta-btn:hover  { opacity: 0.88; }
    .cta-btn:active { opacity: 0.75; }
  </style>
</head>

<script>
  const CIRCUMFERENCE = 2 * Math.PI * 80;

  const ringFill = document.getElementById('ringFill');
  const pctLabel = document.getElementById('pctLabel');
  const loading  = document.getElementById('screenLoading');
  const result   = document.getElementById('screenResult');

  ringFill.style.strokeDasharray  = CIRCUMFERENCE;
  ringFill.style.strokeDashoffset = CIRCUMFERENCE;

  const STEP_MS = 30;

  function ease(t) { return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t; }

  function setProgress(pct) {
    ringFill.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct / 100);
    pctLabel.textContent = Math.round(pct) + '%';
  }

  function runPhase(fromPct, toPct, durationMs, onDone) {
    const start = performance.now();
    const timer = setInterval(() => {
      const t = Math.min((performance.now() - start) / durationMs, 1);
      setProgress(fromPct + (toPct - fromPct) * ease(t));
      if (t >= 1) { clearInterval(timer); onDone(); }
    }, STEP_MS);
  }

  // 스크롤 시 탑바 그림자
  const header = document.getElementById('resultHeader');
  document.querySelector('.result-scroll').addEventListener('scroll', function() {
    header.classList.toggle('scrolled', this.scrollTop > 0);
  });

  // 1단계: 0% → 68% (1.2s)
  runPhase(0, 68, 1200, () => {
    // 2단계: 68% → 72% (1.5s)
    runPhase(68, 72, 1500, () => {
      // 3단계: 72% → 100% (1.0s)
      runPhase(72, 100, 1000, () => {
        setTimeout(() => {
          loading.classList.add('exit');
          result.getBoundingClientRect();
          result.classList.add('show');
          setTimeout(() => { loading.style.display = 'none'; }, 600);
        }, 400);
      });
    });
  });
</script>
