<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가슴둘레 입력</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f8f8f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #fff;
      width: 100%;
      max-width: 600px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 32px;
    }

    .top-nav {
      margin-bottom: 20px;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-left: -6px;
      color: #111;
      border-radius: 8px;
      transition: 0.15s;
    }

    .back-btn:hover { background: #f2f2f2; }

    .step-dots {
      display: flex;
      align-items: center;
      justify-content: left;
      gap: 8px;
      margin-bottom: 12px;
    }

    .step-dot-item {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #e0e0e0;
    }

    .step-dot-item.active {
      width: 24px;
      border-radius: 99px;
      background: #FF4589;
    }

    .header {
      margin-bottom: 48px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1e1e1e;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 15px;
      color: #888;
      line-height: 1.6;
    }

    .input-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .big-input-wrap {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .big-input-wrap input {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 72px;
      font-weight: 700;
      color: #111;
      border: none;
      outline: none;
      width: 150px;
      text-align: right;
      background: transparent;
      caret-color: #111;
    }

    .big-input-wrap input::placeholder { color: #e8e8e8; }

    .big-input-wrap input::-webkit-outer-spin-button,
    .big-input-wrap input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .unit {
      font-size: 28px;
      font-weight: 500;
      color: #bbb;
    }

    .cta-wrapper { padding-top: 16px; }

    .cta-btn {
      width: 100%;
      padding: 18px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .cta-btn:hover { background: #333; }

    .skip-btn {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 15px;
      color: #bbb;
      cursor: pointer;
      text-decoration: none;
    }

    .skip-btn:hover { color: #888; }
  </style>
</head>
<body>
  <div class="container">

    <div class="top-nav">
      <button class="back-btn" onclick="window.location.href='onboarding_1.html'">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>
    <div class="step-dots">
      <div class="step-dot-item"></div>
      <div class="step-dot-item active"></div>
      <div class="step-dot-item"></div>
      <div class="step-dot-item"></div>
      <div class="step-dot-item"></div>
    </div>

    <div class="header">
      <h1>가슴둘레를 입력해주세요</h1>
      <p>옷이 잘 맞는지 확인하는 데 사용돼요</p>
    </div>

    <div class="input-area">
      <div class="big-input-wrap">
        <input type="text" id="chest" placeholder="88" inputmode="numeric" maxlength="3" autofocus />
        <span class="unit">cm</span>
      </div>
    </div>

    <div class="cta-wrapper">
      <button class="cta-btn" id="ctaBtn">다음</button>
      <a class="skip-btn" href="onboarding_loading.html">건너뛰고 분석하기</a>
    </div>

  </div>
  <script>
    const input = document.getElementById('chest');
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '');
    });
    document.getElementById('ctaBtn').addEventListener('click', () => {
      window.location.href = 'onboarding_3.html';
    });
  </script>
</body>
</html>
