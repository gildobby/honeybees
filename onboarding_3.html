<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>어깨너비 입력</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* 기본 하단 여백: Safe Area + 32px */
      --default-bottom-padding: calc(32px + env(safe-area-inset-bottom));
    }

    html, body {
      height: 100%;
      /* 키보드 대응을 위해 overflow: hidden 해제 혹은 최적화 */
      overflow: hidden; 
      position: fixed; /* 모바일에서 고무줄 스크롤 방지 */
      width: 100%;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      display: flex;
      justify-content: center;
    }

    .container {
      background: var(--bg-card);
      width: 100%;
      max-width: 390px;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px 20px 0;
      position: relative;
    }

    .top-nav { margin-bottom: 20px; flex-shrink: 0; }
    .step-dots { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-shrink: 0; }
    .header { margin-bottom: 20px; flex-shrink: 0; }
    
    /* 입력 영역이 가변적으로 공간을 차지하도록 */
    .input-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100px;
    }

    /* 하단 버튼 영역 - 키보드에 따라 위치가 변함 */
    .cta-wrapper {
      position: absolute;
      left: 20px;
      right: 20px;
      bottom: var(--default-bottom-padding);
      background: var(--bg-card);
      transition: bottom 0.1s ease-out; /* 부드럽게 밀려 올라감 */
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* 버튼 스타일 유지 */
    .cta-btn, .unsure-btn {
      width: 100%;
      height: 52px;
