<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>내 체형 정보</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-page);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone {
      background: var(--bg-card);
      width: 100%;
      max-width: 390px;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .result-header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      padding: 0 24px;
      background: var(--bg-card);
      transition: box-shadow 0.2s;
      z-index: 10;
    }

    .result-header.scrolled {
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .result-header svg.logo {
      height: 20px;
      width: auto;
    }

    .back-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: background 0.15s;
    }

    .back-btn:hover { background: var(--bg-chip); }

    /* ── 스크롤 영역 ── */
    .result-scroll {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .result-scroll::-webkit-scrollbar { display: none; }

    /* ── Type title block ── */
    .type-title-block {
      text-align: center;
      padding: 16px 24px 0;
    }

    .type-name {
      font-size: 32px;
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -1px;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .type-subtitle {
      font-size: var(--text-base);
      color: var(--text-secondary);
      font-weight: 400;
    }

    /* ── Illustration ── */
    .illust-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 40px 0px;
    }

    .illust-wrap svg {
      width: auto;
      max-width: 110px;
      height: auto;
      display: block;
      filter: drop-shadow(0 6px 16px rgba(0, 0, 0, 0.10));
    }

    /* ── Gauge section ── */
    .gauge-sec {
      padding: 28px 28px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gauge-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .gauge-label {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      width: 54px;
      flex-shrink: 0;
    }

    .gauge-track {
      flex: 1;
      height: 14px;
      border-radius: var(--radius-pill);
      background: #F0F0F0;
      position: relative;
      overflow: hidden;
    }

    .gauge-fill {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      background: var(--brand);
      border-radius: 0;
    }

    .gauge-track::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        to right,
        transparent 0,
        transparent calc(20% - 0.75px),
        rgba(255, 255, 255, 0.55) calc(20% - 0.75px),
        rgba(255, 255, 255, 0.55) calc(20% + 0.75px),
        transparent calc(20% + 0.75px),
        transparent 20%
      );
      pointer-events: none;
    }

    /* ── Features bullet list ── */
    .features-sec {
      padding: 4px 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .features-item {
      font-size: var(--text-sm);
      color: var(--text-primary);
      line-height: 1.6;
      display: flex;
      gap: 6px;
    }

    .features-item::before {
      content: '·';
      font-size: 18px;
      color: var(--text-secondary);
      flex-shrink: 0;
      line-height: 1.4;
    }

    /* ── Bottom CTA ── */
    .cta-area {
      flex-shrink: 0;
      padding: 12px 20px 32px;
      background: var(--bg-card);
    }

    .cta-btn-outline {
      width: 100%;
      height: 47px;
      padding: 0 24px;
      background: transparent;
      color: var(--text-primary);
      border: 1.5px solid #E0E0E0;
      border-radius: var(--radius);
      font-size: var(--text-base);
      font-weight: 700;
      letter-spacing: -0.2px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

  </style>
</head>

          <div class="gauge-fill" style="width: 60%"></div>
        </div>
      </div>
      <div class="gauge-row">
        <span class="gauge-label">하체너비</span>

    <!-- Features bullet list -->

<script>
  const header = document.querySelector('.result-header');
  document.querySelector('.result-scroll').addEventListener('scroll', function() {
    header.classList.toggle('scrolled', this.scrollTop > 0);
  });
</script>
