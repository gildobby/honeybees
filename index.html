<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mobile Prototype</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-page);
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .desktop {
      width: 100%;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .app-root {
      width: 390px;
      height: 100vh;
      background: var(--bg-card);
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
      font-size: var(--text-base);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Top nav */
    .top-nav {
      padding: 28px 24px 0;
      flex-shrink: 0;
    }
    .top-nav svg {
      height: 20px;
      width: auto;
    }

    /* Login page */
    .login-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 28px 32px;
      margin-top: -200px;
      justify-content: center;
    }

    .login-hero {
      margin-bottom: 36px;
      text-align: center;
    }
    .login-title {
      font-size: var(--text-xl);
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.45;
    }

    /* Social login */
    .social-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .recommend-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-page);
      color: var(--text-primary);
      font-size: var(--text-sm);
      font-weight: 500;
      padding: 4px 10px;
      border-radius: var(--radius-pill);
    }
    .recommend-chip svg { flex-shrink: 0; }

    .btn-social {
      width: 100%;
      height: 52px;
      border: none;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-base);
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      font-family: inherit;
      position: relative;
    }
    .btn-social:active { opacity: 0.88; transform: scale(0.98); }

    .btn-kakao { background: #FEE500; color: #191919; }
    .btn-naver { background: #03C75A; color: #fff; }
    .btn-google {
      background: #fff;
      color: #3c4043;
      border: 1.3px solid #E3E3E3;
    }

    .social-logo {
      position: absolute;
      left: 16px;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* Terms */
    .terms-row {
      margin-top: 16px;
      text-align: center;
      font-size: var(--text-xs);
      color: var(--text-tertiary);
      line-height: 1.7;
      word-break: keep-all;
    }
    .terms-row a {
      color: var(--text-secondary);
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="desktop">
  <div class="app-root">

    <!-- 로고 -->
